<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <filter id="inkWash" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="washBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="50%" stop-color="#f0e9db"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <linearGradient id="inkFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2c2c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#888" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Rice paper background -->
  <rect width="400" height="500" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="476" fill="none" stroke="#2c2c2c" stroke-width="1" opacity="0.5"/>
  <rect x="16" y="16" width="368" height="468" fill="none" stroke="#2c2c2c" stroke-width="0.5" opacity="0.3"/>

  <!-- Full moon behind figure -->
  <circle cx="200" cy="130" r="70" fill="url(#moonGrad)" filter="url(#softBlur)" opacity="0.6"/>

  <!-- Ink wash background texture - distant mountains -->
  <path d="M0 280 Q50 220 100 250 Q130 230 160 260 Q180 240 200 255 Q220 235 250 260 Q280 240 310 250 Q340 225 400 270 L400 500 L0 500Z" fill="#2c2c2c" opacity="0.06"/>

  <!-- Flowing robe silhouette - ink wash style -->
  <!-- Robe body -->
  <path d="M155 140 Q160 130 170 125 Q180 120 190 125 Q200 130 200 140 L200 135 Q210 125 230 120 Q250 115 260 120 Q270 125 270 140 L275 280 Q280 320 285 350 Q290 380 295 420 L290 430 Q280 440 260 445 Q240 448 220 445 Q200 440 190 435 L180 420 Q178 400 175 380 Q170 340 165 300 Q158 260 155 240 Q152 180 155 140Z" fill="#1a1a1a" opacity="0.35" filter="url(#inkWash)"/>

  <!-- Robe sleeve - left -->
  <path d="M160 155 Q130 170 110 200 Q100 220 105 250 Q110 270 125 275 Q135 270 140 255 Q148 230 160 210 Q165 190 160 170Z" fill="#2c2c2c" opacity="0.3" filter="url(#inkWash)"/>

  <!-- Robe sleeve - right -->
  <path d="M265 150 Q290 160 310 185 Q325 210 320 240 Q315 260 300 270 Q290 260 285 245 Q275 220 270 195 Q265 170 265 150Z" fill="#2c2c2c" opacity="0.25" filter="url(#inkWash)"/>

  <!-- Hair - black ink -->
  <path d="M155 140 Q150 120 160 100 Q170 80 185 75 Q200 70 215 75 Q230 80 240 95 Q248 110 250 130 Q248 140 240 145 Q230 150 215 145 Q200 140 185 142 Q170 145 155 140Z" fill="#1a1a1a" opacity="0.85" filter="url(#inkWash)"/>
  <path d="M160 100 Q155 85 170 75 Q185 65 200 65 Q215 65 225 75 Q235 85 230 95" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.6"/>

  <!-- Graceful neck -->
  <path d="M185 130 Q190 140 190 150 Q190 155 185 158" fill="none" stroke="#2c2c2c" stroke-width="1.5" opacity="0.4"/>
  <path d="M210 128 Q208 140 208 150 Q208 155 212 158" fill="none" stroke="#2c2c2c" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle facial features -->
  <ellipse cx="198" cy="118" rx="14" ry="18" fill="#f5f0e8" opacity="0.5"/>
  <!-- Eyes -->
  <line x1="190" y1="115" x2="195" y2="115" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="202" y1="115" x2="207" y2="115" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M188 111 Q192 108 197 110" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <path d="M200 110 Q205 108 210 111" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <!-- Nose -->
  <path d="M198 114 Q196 120 197 124" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <!-- Mouth -->
  <path d="M193 127 Q198 130 203 127" fill="none" stroke="#c03b3b" stroke-width="0.8" opacity="0.5"/>

  <!-- Crane in background - ink wash -->
  <g opacity="0.2" transform="translate(290, 80)">
    <path d="M0 20 Q10 5 20 10 Q30 15 35 25 Q30 30 20 32 Q10 30 0 20Z" fill="#2c2c2c"/>
    <path d="M10 18 Q5 10 15 5 Q20 12 15 18Z" fill="#2c2c2c"/>
    <line x1="30" y1="15" x2="45" y2="25" stroke="#2c2c2c" stroke-width="1"/>
    <line x1="20" y1="25" x2="15" y2="40" stroke="#2c2c2c" stroke-width="0.8"/>
    <line x1="25" y1="28" x2="28" y2="42" stroke="#2c2c2c" stroke-width="0.8"/>
  </g>

  <!-- Plum blossoms -->
  <g opacity="0.4">
    <line x1="55" y1="420" x2="40" y2="380" stroke="#2c2c2c" stroke-width="2"/>
    <line x1="55" y1="420" x2="70" y2="390" stroke="#2c2c2c" stroke-width="1.5"/>
    <line x1="55" y1="420" x2="45" y2="430" stroke="#2c2c2c" stroke-width="1"/>
    <circle cx="35" cy="375" r="3" fill="#c03b3b" opacity="0.6"/>
    <circle cx="43" cy="382" r="2.5" fill="#c03b3b" opacity="0.5"/>
    <circle cx="37" cy="388" r="2" fill="#c03b3b" opacity="0.4"/>
    <circle cx="73" cy="387" r="2.5" fill="#c03b3b" opacity="0.5"/>
    <circle cx="67" cy="394" r="2" fill="#c03b3b" opacity="0.4"/>
    <circle cx="48" cy="432" r="2" fill="#c03b3b" opacity="0.3"/>
  </g>

  <!-- Cloud wisps -->
  <g opacity="0.08">
    <ellipse cx="120" cy="380" rx="40" ry="8" fill="#2c2c2c"/>
    <ellipse cx="300" cy="420" rx="50" ry="6" fill="#2c2c2c"/>
    <ellipse cx="180" cy="460" rx="60" ry="5" fill="#2c2c2c"/>
  </g>

  <!-- Character name in calligraphy -->
  <text x="200" y="465" text-anchor="middle" font-family="serif" font-size="28" fill="#1a1a1a" opacity="0.8" letter-spacing="8" style="writing-mode:horizontal-tb">南宫婉</text>

  <!-- Vermillion seal stamp -->
  <g transform="translate(315, 430)">
    <rect x="0" y="0" width="36" height="36" fill="#c03b3b" opacity="0.85" rx="3"/>
    <!-- Seal characters -->
    <text x="18" y="14" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">南宫</text>
    <text x="18" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">之印</text>
  </g>
</svg>