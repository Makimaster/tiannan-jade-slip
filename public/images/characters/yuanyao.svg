<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <filter id="inkWash" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="50%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="peachGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf0e8"/>
      <stop offset="100%" stop-color="#f5e0d0"/>
    </linearGradient>
  </defs>

  <!-- Rice paper background -->
  <rect width="400" height="500" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="476" fill="none" stroke="#2c2c2c" stroke-width="1" opacity="0.4"/>
  <rect x="16" y="16" width="368" height="468" fill="none" stroke="#2c2c2c" stroke-width="0.5" opacity="0.2"/>

  <!-- Peach blossoms -->
  <g opacity="0.3">
    <path d="M310 180 Q320 160 330 150 Q340 145 342 155 Q335 165 328 178 Q320 185 310 180Z" fill="#faf0e8" stroke="#2c2c2c" stroke-width="0.8"/>
    <path d="M320 250 Q332 235 340 228 Q348 225 345 235 Q338 245 328 255 Q320 258 320 250Z" fill="#faf0e8" stroke="#2c2c2c" stroke-width="0.8"/>
    <circle cx="330" cy="152" r="2" fill="#c03b3b" opacity="0.5"/>
    <circle cx="335" cy="158" r="1.5" fill="#c03b3b" opacity="0.4"/>
    <circle cx="342" cy="230" r="2" fill="#c03b3b" opacity="0.5"/>
  </g>

  <!-- Butterfly -->
  <g opacity="0.2" transform="translate(100, 200)">
    <path d="M0 0 Q-8 -12 -5 -20 Q-2 -25 2 -20 Q0 -12 0 0Z" fill="#2c2c2c"/>
    <path d="M0 0 Q8 -12 5 -20 Q2 -25 -2 -20 Q0 -12 0 0Z" fill="#2c2c2c"/>
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#2c2c2c" stroke-width="0.5"/>
  </g>

  <!-- Soft spring breeze clouds -->
  <g opacity="0.05">
    <ellipse cx="160" cy="70" rx="40" ry="8" fill="#2c2c2c"/>
    <ellipse cx="280" cy="90" rx="35" ry="6" fill="#2c2c2c"/>
    <ellipse cx="200" cy="50" rx="50" ry="7" fill="#2c2c2c"/>
  </g>

  <!-- Young female figure - lively, innocent -->
  <g filter="url(#inkWash)">
    <!-- Robe body - youthful, relaxed -->
    <path d="M162 145 Q166 136 175 128 Q185 122 195 124 Q205 128 212 136 L215 260 Q217 300 219 340 Q221 380 223 420 L217 426 Q208 430 195 432 Q182 430 174 426 L168 420 Q166 380 164 340 Q162 300 160 260 Q158 210 160 175 Q160 158 162 145Z" fill="#2c2c2c" opacity="0.28"/>

    <!-- Hair - youthful style, twin buns or simple -->
    <path d="M168 142 Q165 120 172 100 Q178 85 188 80 Q198 78 208 82 Q218 88 220 105 Q222 122 216 135 Q210 140 200 142 Q188 144 175 142Z" fill="#1a1a1a" opacity="0.6"/>
    <!-- Twin ponytails/buns -->
    <circle cx="172" cy="88" r="8" fill="#1a1a1a" opacity="0.7"/>
    <circle cx="212" cy="88" r="8" fill="#1a1a1a" opacity="0.7"/>
    <path d="M172 80 Q180 72 185 78" fill="none" stroke="#c03b3b" stroke-width="1" opacity="0.5"/>
    <path d="M212 80 Q204 72 199 78" fill="none" stroke="#c03b3b" stroke-width="1" opacity="0.5"/>

    <!-- Face - youthful, bright -->
    <ellipse cx="195" cy="112" rx="12" ry="15" fill="#f5f0e8" opacity="0.5"/>
    <!-- Eyes - large, lively -->
    <ellipse cx="188" cy="108" rx="3" ry="4" fill="#1a1a1a" opacity="0.65"/>
    <ellipse cx="204" cy="108" rx="3" ry="4" fill="#1a1a1a" opacity="0.65"/>
    <!-- Eyebrows -->
    <path d="M183 103 Q189 100 194 103" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <path d="M198 103 Q204 100 210 103" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <!-- Nose - small -->
    <path d="M196 107 Q194 114 195 118" fill="none" stroke="#1a1a1a" stroke-width="0.7" opacity="0.4"/>
    <!-- Mouth - small smile -->
    <path d="M191 120 Q195 123 200 120" fill="none" stroke="#c03b3b" stroke-width="0.8" opacity="0.55"/>

    <!-- Cheek blush -->
    <ellipse cx="182" cy="114" rx="5" ry="3" fill="#c03b3b" opacity="0.1"/>
    <ellipse cx="210" cy="114" rx="5" ry="3" fill="#c03b3b" opacity="0.1"/>
  </g>

  <!-- Starry sea waves (乱星海 reference) -->
  <g opacity="0.08">
    <path d="M20 420 Q50 412 80 420 Q110 428 140 420 Q170 412 200 420 Q230 428 260 420 Q290 412 320 420 Q350 428 380 420" fill="none" stroke="#2c2c2c" stroke-width="1"/>
    <path d="M20 440 Q60 430 100 440 Q140 450 180 440 Q220 430 260 440 Q300 450 340 440 Q380 430 380 438" fill="none" stroke="#2c2c2c" stroke-width="0.8"/>
  </g>

  <!-- Character name -->
  <text x="200" y="480" text-anchor="middle" font-family="serif" font-size="28" fill="#1a1a1a" opacity="0.8" letter-spacing="8">元瑶</text>

  <!-- Vermillion seal -->
  <g transform="translate(318, 442)">
    <rect x="0" y="0" width="34" height="34" fill="#c03b3b" opacity="0.85" rx="3"/>
    <text x="17" y="14" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">星海</text>
    <text x="17" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">散修</text>
  </g>
</svg>