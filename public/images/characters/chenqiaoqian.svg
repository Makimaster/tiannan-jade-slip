<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <filter id="inkWash" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="50%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </linearGradient>
  </defs>

  <!-- Rice paper background -->
  <rect width="400" height="500" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="476" fill="none" stroke="#2c2c2c" stroke-width="1" opacity="0.5"/>
  <rect x="16" y="16" width="368" height="468" fill="none" stroke="#2c2c2c" stroke-width="0.5" opacity="0.25"/>

  <!-- Cherry/plum blossom tree -->
  <g opacity="0.3">
    <path d="M70 420 Q65 380 68 340 Q72 300 75 270 Q78 240 80 210" fill="none" stroke="#2c2c2c" stroke-width="3"/>
    <path d="M73 300 Q85 285 95 280" fill="none" stroke="#2c2c2c" stroke-width="1.5"/>
    <path d="M76 260 Q88 248 96 245" fill="none" stroke="#2c2c2c" stroke-width="1.2"/>
    <path d="M77 310 Q62 300 55 295" fill="none" stroke="#2c2c2c" stroke-width="1.5"/>
    <!-- Blossoms -->
    <circle cx="95" cy="278" r="3" fill="#c03b3b" opacity="0.5"/>
    <circle cx="90" cy="284" r="2.5" fill="#c03b3b" opacity="0.4"/>
    <circle cx="97" cy="243" r="3" fill="#c03b3b" opacity="0.5"/>
    <circle cx="92" cy="248" r="2.5" fill="#c03b3b" opacity="0.4"/>
    <circle cx="55" cy="293" r="3" fill="#c03b3b" opacity="0.4"/>
    <circle cx="58" cy="300" r="2" fill="#c03b3b" opacity="0.3"/>
  </g>

  <!-- Soft distant hills -->
  <path d="M0 300 Q80 260 160 280 Q240 250 320 275 Q360 260 400 290 L400 500 L0 500Z" fill="#2c2c2c" opacity="0.03"/>

  <!-- Gentle female figure -->
  <g filter="url(#inkWash)">
    <!-- Robe body - soft, graceful -->
    <path d="M160 140 Q163 132 172 125 Q182 120 192 122 Q202 125 208 132 L210 260 Q212 300 214 340 Q216 380 218 420 L212 428 Q204 432 192 434 Q180 432 172 428 L166 420 Q164 380 161 340 Q158 300 156 260 Q154 200 156 160 Q158 148 160 140Z" fill="#2c2c2c" opacity="0.3"/>

    <!-- Hair - gentle, simple -->
    <path d="M165 138 Q162 118 168 100 Q175 85 185 80 Q195 78 205 82 Q215 88 218 102 Q222 118 215 130 Q210 135 200 138 Q188 140 175 138Z" fill="#1a1a1a" opacity="0.6"/>
    <!-- Hair flowing down -->
    <path d="M168 100 Q160 110 158 130 Q156 150 155 170" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.3"/>
    <path d="M215 100 Q222 112 224 130 Q226 148 225 165" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.3"/>
    <!-- Simple hairpin -->
    <line x1="185" y1="82" x2="185" y2="65" stroke="#c03b3b" stroke-width="1" opacity="0.5"/>
    <circle cx="185" cy="62" r="2.5" fill="#c03b3b" opacity="0.4"/>

    <!-- Face - gentle, kind -->
    <ellipse cx="195" cy="108" rx="12" ry="16" fill="#f5f0e8" opacity="0.5"/>
    <!-- Eyes - warm, gentle curve -->
    <path d="M187 104 Q191 101 196 104" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
    <path d="M198 104 Q203 101 208 104" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
    <!-- Eyebrows - soft -->
    <path d="M185 99 Q191 96 197 99" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <path d="M197 99 Q203 96 210 99" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <!-- Nose -->
    <path d="M196 103 Q194 110 195 115" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
    <!-- Mouth - gentle smile -->
    <path d="M190 119 Q195 122 200 119" fill="none" stroke="#c03b3b" stroke-width="0.8" opacity="0.5"/>

    <!-- Sleeves - graceful -->
    <path d="M162 148 Q140 162 122 182 Q112 198 116 215 Q126 208 138 195 Q150 180 162 170" fill="none" stroke="#2c2c2c" stroke-width="1.5" opacity="0.3"/>
    <path d="M210 148 Q232 160 250 178 Q258 192 254 208 Q246 202 235 190 Q222 178 212 170" fill="none" stroke="#2c2c2c" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Misty atmosphere -->
  <g opacity="0.04">
    <ellipse cx="300" cy="380" rx="40" ry="7" fill="#2c2c2c"/>
    <ellipse cx="100" cy="410" rx="35" ry="6" fill="#2c2c2c"/>
    <ellipse cx="200" cy="450" rx="50" ry="5" fill="#2c2c2c"/>
  </g>

  <!-- Character name -->
  <text x="200" y="478" text-anchor="middle" font-family="serif" font-size="26" fill="#1a1a1a" opacity="0.8" letter-spacing="6">陈巧倩</text>

  <!-- Vermillion seal -->
  <g transform="translate(318, 440)">
    <rect x="0" y="0" width="34" height="34" fill="#c03b3b" opacity="0.85" rx="3"/>
    <text x="17" y="14" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">黄枫</text>
    <text x="17" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">之印</text>
  </g>
</svg>