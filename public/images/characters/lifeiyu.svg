<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <filter id="inkWash" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="50%" stop-color="#f2ecd8"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="washGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2c2c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#666" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Rice paper background -->
  <rect width="400" height="500" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="476" fill="none" stroke="#2c2c2c" stroke-width="1" opacity="0.5"/>
  <rect x="16" y="16" width="368" height="468" fill="none" stroke="#2c2c2c" stroke-width="0.5" opacity="0.3"/>

  <!-- Background wash - mountain silhouette -->
  <path d="M0 300 Q60 240 120 270 Q180 220 240 260 Q300 230 360 265 Q400 240 400 280 L400 500 L0 500Z" fill="#2c2c2c" opacity="0.05"/>

  <!-- Bamboo stalks -->
  <g opacity="0.35">
    <line x1="45" y1="120" x2="45" y2="460" stroke="#2c2c2c" stroke-width="3"/>
    <line x1="45" y1="160" x2="45" y2="160" stroke="#2c2c2c" stroke-width="1"/>
    <line x1="45" y1="230" x2="45" y2="230" stroke="#2c2c2c" stroke-width="1"/>
    <line x1="45" y1="320" x2="45" y2="320" stroke="#2c2c2c" stroke-width="1"/>
    <!-- Bamboo leaves -->
    <path d="M47 160 Q55 150 65 152 Q55 155 47 160Z" fill="#2c2c2c" opacity="0.6"/>
    <path d="M47 160 Q58 145 68 148 Q56 152 47 160Z" fill="#2c2c2c" opacity="0.5"/>
    <path d="M47 230 Q55 218 68 220 Q55 224 47 230Z" fill="#2c2c2c" opacity="0.6"/>
    <path d="M47 320 Q58 308 70 310 Q56 315 47 320Z" fill="#2c2c2c" opacity="0.5"/>
  </g>

  <!-- Martial artist figure - strong, upright pose -->
  <g filter="url(#inkWash)">
    <!-- Robe body -->
    <path d="M170 120 Q175 115 185 112 Q195 110 205 112 Q215 118 215 125 L220 280 Q222 320 225 370 Q228 400 230 440 L225 445 Q215 448 200 450 Q185 448 175 445 L170 440 Q168 400 165 360 Q162 320 160 280 Q158 240 158 200 Q158 150 170 120Z" fill="#1a1a1a" opacity="0.4"/>

    <!-- Strong shoulders -->
    <path d="M170 125 Q150 135 135 150 Q125 160 128 175 Q135 168 148 155 Q158 142 170 135Z" fill="#2c2c2c" opacity="0.35"/>
    <path d="M215 125 Q235 130 250 145 Q260 155 258 168 Q250 160 238 150 Q225 140 215 135Z" fill="#2c2c2c" opacity="0.35"/>

    <!-- Head -->
    <path d="M175 120 Q178 100 190 85 Q198 78 208 80 Q218 85 222 100 Q225 115 215 122 Q205 125 190 124 Q178 122 175 120Z" fill="#1a1a1a" opacity="0.7"/>

    <!-- Hair knot (topknot) -->
    <ellipse cx="198" cy="78" rx="10" ry="8" fill="#1a1a1a" opacity="0.8"/>
    <!-- Hair tie ribbon -->
    <path d="M198 70 Q210 65 215 70" fill="none" stroke="#c03b3b" stroke-width="1.5" opacity="0.7"/>
    <path d="M198 70 Q186 65 182 72" fill="none" stroke="#c03b3b" stroke-width="1.5" opacity="0.7"/>

    <!-- Face -->
    <ellipse cx="196" cy="100" rx="12" ry="15" fill="#f5f0e8" opacity="0.4"/>
    <!-- Eyes - determined -->
    <line x1="187" y1="96" x2="193" y2="96" stroke="#1a1a1a" stroke-width="1.8" opacity="0.7"/>
    <line x1="200" y1="96" x2="206" y2="96" stroke="#1a1a1a" stroke-width="1.8" opacity="0.7"/>
    <!-- Brows - strong -->
    <path d="M185 92 Q190 88 195 91" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
    <path d="M198 91 Q203 88 208 92" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
    <!-- Nose -->
    <path d="M196 95 Q194 102 195 106" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
    <!-- Mouth - firm -->
    <line x1="191" y1="110" x2="201" y2="110" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>

    <!-- Belt sash -->
    <path d="M165 280 Q200 290 235 280" fill="none" stroke="#2c2c2c" stroke-width="2.5" opacity="0.5"/>
    <path d="M190 280 L185 300 Q183 310 188 315" fill="none" stroke="#c03b3b" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Ink wash ground shadow -->
  <ellipse cx="200" cy="455" rx="60" ry="8" fill="#2c2c2c" opacity="0.08"/>

  <!-- Character name -->
  <text x="200" y="480" text-anchor="middle" font-family="serif" font-size="28" fill="#1a1a1a" opacity="0.8" letter-spacing="6">厉飞雨</text>

  <!-- Vermillion seal -->
  <g transform="translate(320, 440)">
    <rect x="0" y="0" width="34" height="34" fill="#c03b3b" opacity="0.85" rx="3"/>
    <text x="17" y="14" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">七玄</text>
    <text x="17" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e8" opacity="0.9">之印</text>
  </g>
</svg>